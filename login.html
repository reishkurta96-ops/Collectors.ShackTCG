<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Collector's Shack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="Collector's Shack Logo" class="logo-image">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="products.html">Shop</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
            <div class="cart-icon" onclick="window.location.href='products.html'">
                Cart
            </div>
        </nav>
    </header>

    <section class="auth-section">
        <div class="auth-container">
            <h1>Welcome Back!</h1>
            <p class="auth-subtitle">Login to your account</p>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>

                <button type="submit" class="auth-btn">Login</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </p>
        </div>
    </section>

    <footer>
        <h3>Collector's Shack</h3>
        <p>Your trusted source for Trading Card Games</p>
        <p>Email: info@collectorsshack.com | Phone: (555) 123-4567</p>
        <p>&copy; 2026 Collector's Shack. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
